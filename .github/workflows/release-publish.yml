name: Publish npm package (OIDC trusted publishing)

# Hoort in de PUBLIEKE org-repo (your-org/kern-cms-public) — sync-public.yml in de
# private repo zet dit bestand daar automatisch neer, samen met de rest van
# packages/create-kern-cms. npm's Trusted Publisher-koppeling wijst naar precies dit
# workflow-bestand in precies deze repo, dus verplaats of hernoem het niet zonder
# de instelling op npmjs.com mee te wijzigen.
#
# Trigger: de GitHub Release die release-build.yml (private repo) hier aanmaakt.
#
# Eenmalige voorbereiding (kan niet geautomatiseerd worden, npm-vereiste):
#   1. Eén keer handmatig `npm publish --access public` vanaf je eigen machine
#      vanuit packages/create-kern-cms, zodat het pakket op npmjs.com bestaat.
#   2. npmjs.com → package settings → "Trusted Publisher" → GitHub Actions:
#        organisatie/repo : your-org/kern-cms-public
#        workflow-bestand  : release-publish.yml
#        environment       : npm-publish
#      (moet exact overeenkomen, inclusief hoofdlettergebruik van de org-naam)
#
# Na deze twee stappen is er nooit meer een NPM_TOKEN-secret nodig.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # vereist voor OIDC — hiermee genereert GitHub het publish-token

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout de tag van deze release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: npm ophogen naar een OIDC-compatibele versie
        run: npm install -g npm@latest   # Trusted Publishing vereist npm >= 11.5.1

      - name: "Sanity-check: package.json-versie moet de tag matchen"
        working-directory: packages/create-kern-cms
        run: |
          set -euo pipefail
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json ($PKG_VERSION) komt niet overeen met de tag ($TAG_VERSION)"
            exit 1
          fi
        env:
          GITHUB_REF_NAME: ${{ github.event.release.tag_name }}

      - name: Publiceer naar npm
        working-directory: packages/create-kern-cms
        run: npm publish --access public
        # Geen NPM_TOKEN nodig: de npm CLI detecteert deze OIDC-omgeving vanzelf
        # (mits de Trusted Publisher hierboven correct is ingesteld) en genereert
        # automatisch provenance-attestaties bij het publiceren.