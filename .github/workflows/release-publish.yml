name: Publish npm package (OIDC trusted publishing)

# Hoort in de PUBLIEKE org-repo (kern-cms/kern) en wordt DAAR beheerd. sync-public.yml
# in de private repo sluit .github bewust uit van de sync, zodat dit bestand nooit door
# een sync wordt overschreven of verwijderd. npm's Trusted Publisher-koppeling wijst naar
# precies dit workflow-bestand in precies deze repo, dus verplaats of hernoem het niet
# zonder de instelling op npmjs.com mee te wijzigen.
#
# Trigger: de GitHub Release die release-build.yml (private repo) hier aanmaakt.
#
# Eenmalige voorbereiding (kan niet geautomatiseerd worden, npm-vereiste):
#   1. Eén keer handmatig `npm publish --access public` vanaf je eigen machine
#      vanuit packages/create-kern-cms, zodat het pakket op npmjs.com bestaat.
#   2. npmjs.com → package settings → "Trusted Publisher" → GitHub Actions:
#        organisatie/repo : kern-cms/kern
#        workflow-bestand  : release-publish.yml
#        environment       : npm-publish
#      (moet exact overeenkomen, inclusief hoofdlettergebruik van de org-naam)
#
# Na deze twee stappen is er nooit meer een NPM_TOKEN-secret nodig.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # vereist voor OIDC — hiermee genereert GitHub het publish-token

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      # Bewust de DEFAULT BRANCH uitchecken, niet de release-tag. De tag wordt door
      # release-build (private repo) op de HEAD van deze main gezet; als de sync de
      # nieuwe create-kern-cms nog niet had geplaatst, wees die tag naar een commit
      # met de vórige versie. main loopt altijd bij, dus vanaf main + wachten op de
      # juiste versie is immuun voor die tag-timing.
      - name: Checkout de publieke repo (default branch)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          # Node 24 levert standaard npm >= 11.5.1 mee (vereist voor Trusted
          # Publishing) én een intacte, meegebundelde sigstore-module voor de
          # provenance-attestatie. Bewust GEEN `npm install -g npm@latest`: die
          # in-place zelf-upgrade laat npm zonder sigstore achter, wat de publish
          # liet crashen met "Cannot find module 'sigstore'".
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Wacht tot de sync create-kern-cms op de release-versie heeft
        env:
          GITHUB_REF_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # De sync-workflow (private repo) draait onafhankelijk; geef 'm tot ~5 min
          # om create-kern-cms op de release-versie te zetten. Zo faalt de publish
          # niet op een race, maar wacht 'm netjes af en pakt de juiste versie.
          for i in $(seq 1 30); do
            PKG_VERSION="$(node -p "require('./packages/create-kern-cms/package.json').version")"
            if [ "$PKG_VERSION" = "$TAG_VERSION" ]; then
              echo "create-kern-cms $PKG_VERSION komt overeen met tag $TAG_VERSION."
              exit 0
            fi
            echo "Nog niet gesynct (package.json=$PKG_VERSION, tag=$TAG_VERSION); wacht 10s… ($i/30)"
            sleep 10
            git pull --ff-only origin main
          done
          echo "::error::create-kern-cms bereikte versie $TAG_VERSION niet op main binnen de wachttijd (bleef op $PKG_VERSION)."
          exit 1

      - name: Publiceer naar npm
        working-directory: packages/create-kern-cms
        run: npm publish --access public
        # Geen NPM_TOKEN nodig: de npm CLI detecteert deze OIDC-omgeving vanzelf
        # (mits de Trusted Publisher hierboven correct is ingesteld) en genereert
        # automatisch provenance-attestaties bij het publiceren.